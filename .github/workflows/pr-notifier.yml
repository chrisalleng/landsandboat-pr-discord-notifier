name: LandSandBoat PR Notifier

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: landsandboat-pr-notifier
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run notifier
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone

          OWNER = "LandSandBoat"
          REPO = "server"
          STATE_FILE = "pr_state.json"
          WEBHOOK_URL = os.environ["WEBHOOK_URL"]

          API_URL = f"https://api.github.com/repos/{OWNER}/{REPO}/pulls?state=all&sort=updated&direction=desc&per_page=100"

          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "landsandboat-pr-notifier",
          }

          def load_state():
              if os.path.exists(STATE_FILE):
                  with open(STATE_FILE, "r", encoding="utf-8") as f:
                      return json.load(f)
              return {"opened_seen": {}, "merged_seen": {}}

          def save_state(state):
              with open(STATE_FILE, "w", encoding="utf-8") as f:
                  json.dump(state, f, indent=2, sort_keys=True)

          def fetch_prs():
              req = urllib.request.Request(API_URL, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def post_discord(content):
              data = json.dumps({
                  "content": content,
                  "allowed_mentions": {"parse": []}
              }).encode("utf-8")

              req = urllib.request.Request(
                  WEBHOOK_URL,
                  data=data,
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "landsandboat-pr-notifier",
                  },
                  method="POST",
              )

              try:
                  with urllib.request.urlopen(req) as resp:
                      body = resp.read().decode("utf-8", errors="replace")
                      if body:
                          print(body)
                      return True
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  print(f"Discord post failed: HTTP {e.code} {e.reason}")
                  print(body)
                  return False

          def sort_key(msg):
              m = re.search(r"#(\d+)", msg)
              return int(m.group(1)) if m else 0

          state = load_state()
          first_run = not os.path.exists(STATE_FILE)
          prs = fetch_prs()

          opened_seen = state.get("opened_seen", {})
          merged_seen = state.get("merged_seen", {})

          opened_messages = []
          merged_messages = []

          for pr in prs:
              num = str(pr["number"])
              title = pr["title"]
              url = pr["html_url"]
              author = pr["user"]["login"]
              created_at = pr["created_at"]
              merged_at = pr.get("merged_at")
              merged_by = pr.get("merged_by", {}).get("login") if pr.get("merged_by") else None

              if num not in opened_seen:
                  opened_seen[num] = created_at
                  if not first_run:
                      opened_messages.append(
                          f"🟢 PR opened: #{num} {title} — @{author}\n{url}"
                      )

              if merged_at and num not in merged_seen:
                  merged_seen[num] = merged_at
                  if not first_run:
                      who = f" by @{merged_by}" if merged_by else ""
                      merged_messages.append(
                          f"🔵 PR merged: #{num} {title}{who}\n{url}"
                      )

          discord_ok = True

          for msg in sorted(opened_messages, key=sort_key):
              if not post_discord(msg):
                  discord_ok = False
                  break

          if discord_ok:
              for msg in sorted(merged_messages, key=sort_key):
                  if not post_discord(msg):
                      discord_ok = False
                      break

          state["opened_seen"] = opened_seen
          state["merged_seen"] = merged_seen
          state["last_run_utc"] = datetime.now(timezone.utc).isoformat()
          state["last_discord_ok"] = discord_ok
          save_state(state)

          if not discord_ok:
              raise SystemExit("Discord webhook failed; state was still saved.")
          PY

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr_state.json
          git diff --cached --quiet || git commit -m "Update PR notifier state"
          git push